<!DOCTYPE html>
<html lang="zh-CN">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>ZKL-DSB</title>

    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            width: 100vw;
            height: 100vh;
            overflow: hidden;
            background: #05020d;
            font-family: "Microsoft YaHei", "PingFang SC", sans-serif;
        }
        /* 海报主体 */
        
        .poster {
            position: relative;
            width: 100vw;
            height: 100vh;
            overflow: hidden;
            background: radial-gradient(circle at 50% 20%, rgba(255, 214, 120, 0.28), transparent 28%), radial-gradient(circle at 20% 70%, rgba(161, 80, 255, 0.35), transparent 30%), radial-gradient(circle at 80% 80%, rgba(255, 60, 160, 0.28), transparent 32%), linear-gradient(145deg, #060015 0%, #13001f 45%, #03010a 100%);
        }
        /* 动态流光背景 */
        
        .poster::before {
            content: "";
            position: absolute;
            inset: -30%;
            background: conic-gradient( from 0deg, transparent, rgba(255, 215, 130, 0.18), transparent, rgba(180, 80, 255, 0.2), transparent, rgba(255, 80, 160, 0.18), transparent);
            animation: rotateGlow 18s linear infinite;
            filter: blur(40px);
        }
        /* 金色细网纹 */
        
        .poster::after {
            content: "";
            position: absolute;
            inset: 0;
            background-image: linear-gradient(rgba(255, 220, 130, 0.06) 1px, transparent 1px), linear-gradient(90deg, rgba(255, 220, 130, 0.06) 1px, transparent 1px);
            background-size: 56px 56px;
            mask-image: radial-gradient(circle at center, black, transparent 75%);
            opacity: 0.5;
        }
        /* 中间 1/3 内容区域 */
        
        .center-column {
            position: absolute;
            left: 50%;
            top: 0;
            transform: translateX(-50%);
            width: 80vw;
            height: 100vh;
            z-index: 5;
            display: grid;
            grid-template-rows: 1fr 2fr;
            padding: 4vh 0;
        }
        /* 上面 1/3：两行文本 */
        
        .text-area {
            position: relative;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            gap: 1.2vh;
            text-align: center;
            padding: 2vh 1vw;
        }
        
        .main-title {
            font-size: clamp(26px, 3vw, 58px);
            font-weight: 900;
            letter-spacing: 0.12em;
            color: #fff4cc;
            text-shadow: 0 0 8px rgba(255, 220, 140, 0.9), 0 0 24px rgba(255, 180, 60, 0.65), 0 0 50px rgba(255, 120, 40, 0.45);
            animation: titleGlow 2.8s ease-in-out infinite alternate;
        }
        
        .sub-title {
            font-size: clamp(14px, 1.25vw, 28px);
            font-weight: 500;
            letter-spacing: 0.22em;
            color: rgba(255, 244, 210, 0.9);
            text-shadow: 0 0 14px rgba(255, 205, 120, 0.65);
        }
        /* 文本区域金色边框装饰 */
        
        .text-frame {
            position: absolute;
            width: 88%;
            height: 58%;
            border: 1px solid rgba(255, 218, 140, 0.42);
            border-radius: 26px;
            box-shadow: inset 0 0 24px rgba(255, 210, 110, 0.12), 0 0 30px rgba(255, 190, 90, 0.18);
            pointer-events: none;
        }
        
        .text-frame::before,
        .text-frame::after {
            content: "";
            position: absolute;
            width: 42px;
            height: 42px;
            border-color: #ffd27a;
            border-style: solid;
        }
        
        .text-frame::before {
            left: -3px;
            top: -3px;
            border-width: 2px 0 0 2px;
            border-radius: 24px 0 0 0;
        }
        
        .text-frame::after {
            right: -3px;
            bottom: -3px;
            border-width: 0 2px 2px 0;
            border-radius: 0 0 24px 0;
        }
        /* 图片容器区域 */
        
        .img-area {
            position: relative;
            display: flex;
            align-items: center;
            justify-content: space-between;
            gap: 1.2vw;
            padding: 2vh 1vw 5vh;
            width: 100%;
            height: 100%;
        }
        /* 单张图片外框（保留原流光渐变边框） */
        
        .img-card {
            flex: 1;
            height: 88%;
            position: relative;
            border-radius: 30px;
            padding: 3px;
            background: linear-gradient( 135deg, #fff1b8, #ffb347, #d75cff, #ff4fa3, #fff1b8);
            box-shadow: 0 0 25px rgba(255, 200, 100, 0.5), 0 0 70px rgba(180, 80, 255, 0.35), inset 0 0 20px rgba(255, 255, 255, 0.18);
            animation: frameShine 4s linear infinite;
            overflow: hidden;
        }
        
        .img-card img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            border-radius: 27px;
            display: block;
        }
        /* 流光扫过 */
        
        .img-card::after {
            content: "";
            position: absolute;
            inset: 3px;
            border-radius: 27px;
            background: linear-gradient( 120deg, transparent 0%, transparent 38%, rgba(255, 255, 255, 0.28) 50%, transparent 62%, transparent 100%);
            transform: translateX(-120%);
            animation: scanLight 4.5s ease-in-out infinite;
            pointer-events: none;
        }
        /* 左右装饰区域 */
        
        .side-decor {
            position: absolute;
            top: 0;
            width: 33.333vw;
            height: 100vh;
            z-index: 2;
            pointer-events: none;
        }
        
        .side-left {
            left: 0;
        }
        
        .side-right {
            right: 0;
        }
        /* 华丽圆环装饰 */
        
        .ring {
            position: absolute;
            border-radius: 50%;
            border: 1px solid rgba(255, 215, 130, 0.32);
            box-shadow: 0 0 22px rgba(255, 190, 90, 0.22), inset 0 0 22px rgba(255, 190, 90, 0.12);
            animation: floatRing 8s ease-in-out infinite alternate;
        }
        
        .ring.one {
            width: 18vw;
            height: 18vw;
            left: 8%;
            top: 10%;
        }
        
        .ring.two {
            width: 12vw;
            height: 12vw;
            right: 8%;
            top: 18%;
            animation-delay: -2s;
        }
        
        .ring.three {
            width: 22vw;
            height: 22vw;
            left: 4%;
            bottom: 8%;
            animation-delay: -4s;
        }
        
        .ring.four {
            width: 16vw;
            height: 16vw;
            right: 6%;
            bottom: 12%;
            animation-delay: -1s;
        }
        /* 星光粒子 */
        
        .particle {
            position: absolute;
            width: 4px;
            height: 4px;
            background: #fff4c7;
            border-radius: 50%;
            box-shadow: 0 0 8px #fff0b0, 0 0 18px #ffc56a;
            animation: particleMove 6s linear infinite;
        }
        
        .p1 {
            left: 12%;
            top: 22%;
            animation-delay: 0s;
        }
        
        .p2 {
            left: 28%;
            top: 68%;
            animation-delay: -1.2s;
        }
        
        .p3 {
            left: 18%;
            top: 82%;
            animation-delay: -2.4s;
        }
        
        .p4 {
            right: 16%;
            top: 16%;
            animation-delay: -0.8s;
        }
        
        .p5 {
            right: 26%;
            top: 58%;
            animation-delay: -2s;
        }
        
        .p6 {
            right: 10%;
            top: 78%;
            animation-delay: -3.2s;
        }
        
        .p7 {
            left: 6%;
            top: 44%;
            animation-delay: -4s;
        }
        
        .p8 {
            right: 8%;
            top: 38%;
            animation-delay: -5s;
        }
        /* 金色飘带 */
        
        .ribbon {
            position: absolute;
            width: 36vw;
            height: 16vh;
            border-radius: 50%;
            border-top: 2px solid rgba(255, 210, 120, 0.45);
            filter: blur(0.4px);
            animation: ribbonWave 7s ease-in-out infinite alternate;
        }
        
        .ribbon.left-a {
            left: -8vw;
            top: 32vh;
            transform: rotate(-22deg);
        }
        
        .ribbon.left-b {
            left: -10vw;
            bottom: 18vh;
            transform: rotate(18deg);
            animation-delay: -2s;
        }
        
        .ribbon.right-a {
            right: -8vw;
            top: 30vh;
            transform: rotate(22deg);
            animation-delay: -1s;
        }
        
        .ribbon.right-b {
            right: -10vw;
            bottom: 18vh;
            transform: rotate(-18deg);
            animation-delay: -3s;
        }
        /* 底部华丽光晕 */
        
        .bottom-glow {
            position: absolute;
            left: 50%;
            bottom: -14vh;
            transform: translateX(-50%);
            width: 72vw;
            height: 28vh;
            background: radial-gradient( ellipse at center, rgba(255, 190, 80, 0.42), rgba(180, 80, 255, 0.18), transparent 70%);
            filter: blur(24px);
            z-index: 1;
            animation: pulseGlow 3.5s ease-in-out infinite alternate;
        }
        /* 动画 */
        
        @keyframes rotateGlow {
            from {
                transform: rotate(0deg);
            }
            to {
                transform: rotate(360deg);
            }
        }
        
        @keyframes titleGlow {
            from {
                filter: brightness(1);
                transform: scale(1);
            }
            to {
                filter: brightness(1.35);
                transform: scale(1.025);
            }
        }
        
        @keyframes frameShine {
            0% {
                filter: hue-rotate(0deg) brightness(1);
            }
            50% {
                filter: hue-rotate(18deg) brightness(1.15);
            }
            100% {
                filter: hue-rotate(0deg) brightness(1);
            }
        }
        
        @keyframes scanLight {
            0%,
            35% {
                transform: translateX(-120%);
            }
            65%,
            100% {
                transform: translateX(120%);
            }
        }
        
        @keyframes floatRing {
            from {
                transform: translateY(0) rotate(0deg) scale(1);
                opacity: 0.45;
            }
            to {
                transform: translateY(-28px) rotate(18deg) scale(1.06);
                opacity: 0.85;
            }
        }
        
        @keyframes particleMove {
            0% {
                transform: translateY(0) scale(1);
                opacity: 0;
            }
            20% {
                opacity: 1;
            }
            70% {
                opacity: 0.9;
            }
            100% {
                transform: translateY(-120px) scale(0.4);
                opacity: 0;
            }
        }
        
        @keyframes ribbonWave {
            from {
                opacity: 0.35;
                filter: blur(0.5px);
            }
            to {
                opacity: 0.9;
                filter: blur(0);
            }
        }
        
        @keyframes pulseGlow {
            from {
                opacity: 0.45;
                transform: translateX(-50%) scale(1);
            }
            to {
                opacity: 0.85;
                transform: translateX(-50%) scale(1.08);
            }
        }
        /* 移动端适配 */
        
        @media (max-width: 768px) {
            .center-column {
                width: 94vw;
            }
            .img-area {
                gap: 0.6vw;
            }
            .main-title {
                font-size: 32px;
            }
            .sub-title {
                font-size: 14px;
            }
            .ring.one,
            .ring.three {
                width: 38vw;
                height: 38vw;
            }
            .ring.two,
            .ring.four {
                width: 28vw;
                height: 28vw;
            }
        }
    </style>
</head>

<body>
    <div class="poster">
        <!-- 左侧装饰 -->
        <div class="side-decor side-left">
            <div class="ring one"></div>
            <div class="ring three"></div>
            <div class="ribbon left-a"></div>
            <div class="ribbon left-b"></div>
        </div>
        <!-- 右侧装饰 -->
        <div class="side-decor side-right">
            <div class="ring two"></div>
            <div class="ring four"></div>
            <div class="ribbon right-a"></div>
            <div class="ribbon right-b"></div>
        </div>
        <!-- 粒子 -->
        <div class="particle p1"></div>
        <div class="particle p2"></div>
        <div class="particle p3"></div>
        <div class="particle p4"></div>
        <div class="particle p5"></div>
        <div class="particle p6"></div>
        <div class="particle p7"></div>
        <div class="particle p8"></div>
        <!-- 底部光晕 -->
        <div class="bottom-glow"></div>

        <!-- 中间内容 -->
        <main class="center-column">
            <section class="text-area">
                <div class="text-frame"></div>
                <h1 class="main-title">ZKLSB</h1>
                <p class="sub-title">ZKU:WSDSB</p>
            </section>

            <!-- 三张图片 横向并列 -->
            <section class="img-area">
                <div class="img-card">
                    <img src="s.jpg" alt="图1">
                </div>
                <div class="img-card">
                    <img src="zkl.jpg" alt="图2">
                </div>
                <div class="img-card">
                    <img src="sb.jpg" alt="图3">
                </div>
            </section>
        </main>
    </div>
</body>

</html>
